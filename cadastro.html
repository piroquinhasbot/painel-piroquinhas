<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta — Piroquinhas Bot</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="brand-emoji">🤖</span>
        <h1>Piroquinhas Bot</h1>
        <p class="brand-sub">Criar Conta</p>
      </div>

      <form id="cadastroForm" novalidate>
        <div class="field-group">
          <label for="idWhatsApp">Número do WhatsApp</label>
          <input id="idWhatsApp" type="tel" placeholder="5565999999999"
            autocomplete="tel" maxlength="15" required />
          <span class="field-hint">DDI + DDD + número, só dígitos. Ex: 5565912345678</span>
        </div>

        <div class="field-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="seu@email.com"
            autocomplete="email" required />
          <span class="field-hint">Você receberá o código de verificação neste email.</span>
        </div>

        <div class="field-group">
          <label for="username">Nome de usuário</label>
          <input id="username" type="text" placeholder="seu_usuario"
            autocomplete="username" maxlength="30" required />
          <span class="field-hint">3–30 caracteres. Letras, números e _</span>
        </div>

        <div class="field-group">
          <label for="password">Senha</label>
          <div class="password-wrap">
            <input id="password" type="password" placeholder="Mínimo 6 caracteres"
              autocomplete="new-password" required />
            <button type="button" class="toggle-pw" aria-label="Mostrar senha" tabindex="-1">👁️</button>
          </div>
        </div>

        <div class="field-group">
          <label for="passwordConfirm">Confirmar senha</label>
          <div class="password-wrap">
            <input id="passwordConfirm" type="password" placeholder="Repita a senha"
              autocomplete="new-password" required />
            <button type="button" class="toggle-pw2" aria-label="Mostrar senha" tabindex="-1">👁️</button>
          </div>
        </div>

        <div id="cadastroMsg" class="msg hidden"></div>

        <!-- ETAPA 1: botão enviar código -->
        <div id="etapa1">
          <button type="button" class="btn-primary" id="btnEnviarOtp">
            <span class="btn-label">Enviar código de verificação</span>
            <span class="btn-spinner hidden">⏳</span>
          </button>
        </div>

        <!-- ETAPA 2: campo OTP + botão criar conta (oculto até enviar) -->
        <div id="etapa2" class="hidden">
          <div class="field-group">
            <label for="otp">Código recebido no email</label>
            <input id="otp" type="text" placeholder="000000"
              maxlength="6" inputmode="numeric" autocomplete="one-time-code" />
            <span class="field-hint">Digite o código de 6 dígitos enviado para o seu email.</span>
          </div>
          <button type="submit" class="btn-primary" id="btnCadastrar">
            <span class="btn-label">Criar conta</span>
            <span class="btn-spinner hidden">⏳</span>
          </button>
          <button type="button" class="btn-secondary" id="btnReenviar" style="margin-top:0.5rem;width:100%">
            🔁 Reenviar código
          </button>
        </div>
      </form>

      <p class="auth-footer">
        Já tem conta? <a href="login.html">Entrar</a>
      </p>
    </div>
  </div>

  <script>
    const API = 'https://whatsappbot2-s3dx.onrender.com/api';

    if (localStorage.getItem('jwt')) {
      window.location.replace('perfil.html');
    }

    const form   = document.getElementById('cadastroForm');
    const btn    = document.getElementById('btnCadastrar');
    const msgBox = document.getElementById('cadastroMsg');

    document.querySelector('.toggle-pw').addEventListener('click', () => {
      const inp = document.getElementById('password');
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      document.querySelector('.toggle-pw').textContent = show ? '🙈' : '👁️';
    });
    document.querySelector('.toggle-pw2').addEventListener('click', () => {
      const inp = document.getElementById('passwordConfirm');
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      document.querySelector('.toggle-pw2').textContent = show ? '🙈' : '👁️';
    });

    function setLoading(on) {
      btn.disabled = on;
      btn.querySelector('.btn-label').classList.toggle('hidden', on);
      btn.querySelector('.btn-spinner').classList.toggle('hidden', !on);
    }

    function showMsg(text, tipo = 'error') {
      msgBox.textContent = text;
      msgBox.className = `msg msg--${tipo}`;
    }

    function msgPorStatus(status, serverMsg) {
      if (status === 400) {
        const seguros = ['entre 3 e 30', 'letras, números', 'mínimo 6', 'já está em uso', 'Perfil não encontrado'];
        if (serverMsg && seguros.some(s => serverMsg.includes(s))) return serverMsg;
        return 'Dados inválidos. Verifique os campos e tente novamente.';
      }
      if (status === 404) return 'Número não encontrado. Mande uma mensagem no grupo primeiro.';
      if (status === 429) return 'Muitas tentativas. Aguarde alguns minutos.';
      if (status >= 500) return 'Servidor indisponível. Tente novamente mais tarde.';
      return 'Erro ao criar conta.';
    }

    // Fetch com retry automático e aviso de "servidor acordando"
    async function fetchComRetry(url, opts, tentativas = 2) {
      for (let i = 0; i < tentativas; i++) {
        try {
          if (i === 1) showMsg('⏳ Servidor acordando, aguarde...', 'info');
          const res = await fetch(url, opts);
          return res;
        } catch (e) {
          if (i === tentativas - 1) throw e;
          await new Promise(r => setTimeout(r, 4000));
        }
      }
    }

    const btnEnviarOtp = document.getElementById('btnEnviarOtp');
    const btnReenviar  = document.getElementById('btnReenviar');

    async function enviarOtp() {
      const rawTel        = document.getElementById('idWhatsApp').value;
      const idWhatsAppNum = rawTel.replace(/\D/g, '');
      const email         = document.getElementById('email').value.trim();

      if (!idWhatsAppNum || idWhatsAppNum.length < 10 || idWhatsAppNum.length > 15) {
        showMsg('Número inválido. Use DDI + DDD + número (só dígitos).');
        return;
      }
      if (!email || !email.includes('@')) {
        showMsg('Digite um email válido.');
        return;
      }

      const btn = btnEnviarOtp;
      btn.disabled = true;
      btn.querySelector('.btn-label').classList.add('hidden');
      btn.querySelector('.btn-spinner').classList.remove('hidden');

      try {
        const res = await fetchComRetry(`${API}/auth/otp/enviar`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            idWhatsApp: `${idWhatsAppNum}@s.whatsapp.net`,
            email,
          }),
        });
        const data = await res.json();

        if (!res.ok) {
          showMsg(data.error || 'Erro ao enviar código.');
          btn.disabled = false;
          btn.querySelector('.btn-label').classList.remove('hidden');
          btn.querySelector('.btn-spinner').classList.add('hidden');
          return;
        }

        showMsg('✅ Código enviado! Verifique seu email.', 'success');
        document.getElementById('etapa1').classList.add('hidden');
        document.getElementById('etapa2').classList.remove('hidden');

      } catch {
        showMsg('Não foi possível conectar ao servidor.');
        btn.disabled = false;
        btn.querySelector('.btn-label').classList.remove('hidden');
        btn.querySelector('.btn-spinner').classList.add('hidden');
      } finally {
        btn.querySelector('.btn-spinner').classList.add('hidden');
        btn.querySelector('.btn-label').classList.remove('hidden');
      }
    }

    btnEnviarOtp.addEventListener('click', enviarOtp);
    btnReenviar.addEventListener('click', enviarOtp);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const rawTel          = document.getElementById('idWhatsApp').value;
      const idWhatsAppNum   = rawTel.replace(/\D/g, '');
      const email           = document.getElementById('email').value.trim();
      const username        = document.getElementById('username').value.trim();
      const password        = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;

      if (!idWhatsAppNum || idWhatsAppNum.length < 10 || idWhatsAppNum.length > 15) {
        showMsg('Número inválido. Use DDI + DDD + número (só dígitos).');
        return;
      }
      if (!email || !email.includes('@')) {
        showMsg('Digite um email válido.');
        return;
      }
      if (username.length < 3) {
        showMsg('Nome de usuário muito curto (mínimo 3 caracteres).');
        return;
      }
      if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        showMsg('Usuário só pode ter letras, números e _.');
        return;
      }
      if (password.length < 6) {
        showMsg('Senha muito curta (mínimo 6 caracteres).');
        return;
      }
      if (password !== passwordConfirm) {
        showMsg('As senhas não conferem.');
        return;
      }

      const otp = document.getElementById('otp')?.value?.trim();
      if (!otp || otp.length !== 6) {
        showMsg('Digite o código de 6 dígitos recebido no email.');
        return;
      }

      setLoading(true);
      try {
        const res = await fetchComRetry(`${API}/auth/cadastrar`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            idWhatsApp: `${idWhatsAppNum}@s.whatsapp.net`,
            email,
            username,
            password,
            otp,
          }),
        });

        const data = await res.json();

        if (res.status === 409 && data.error?.includes('já possui')) {
          showMsg('Você já tem uma conta. Redirecionando para o login…', 'info');
          setTimeout(() => window.location.replace('login.html'), 2000);
          return;
        }

        if (res.status === 409) {
          if (data.error?.includes('email')) {
            showMsg('Este email já está sendo usado por outra conta.');
          } else {
            showMsg('Este nome de usuário já está em uso. Escolha outro.');
          }
          return;
        }

        if (!res.ok) {
          showMsg(msgPorStatus(res.status, data.error));
          return;
        }

        showMsg('Conta criada! Redirecionando para o login…', 'success');
        setTimeout(() => window.location.replace('login.html'), 2000);

      } catch {
        showMsg('Não foi possível conectar ao servidor. Tente novamente em instantes.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
