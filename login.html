<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Piroquinhas Bot</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="brand-emoji">🤖</span>
        <h1>Piroquinhas Bot</h1>
        <p class="brand-sub">Painel do Usuário</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="field-group">
          <label for="username">Usuário</label>
          <input
            id="username"
            type="text"
            placeholder="seu_usuario"
            autocomplete="username"
            maxlength="30"
            required
          />
        </div>

        <div class="field-group">
          <label for="password">Senha</label>
          <div class="password-wrap">
            <input
              id="password"
              type="password"
              placeholder="••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pw" aria-label="Mostrar senha" tabindex="-1">👁️</button>
          </div>
        </div>

        <div id="loginError" class="msg msg--error hidden"></div>

        <button type="submit" class="btn-primary" id="btnLogin">
          <span class="btn-label">Entrar</span>
          <span class="btn-spinner hidden">⏳</span>
        </button>
      </form>

      <p class="auth-footer">
        Não tem conta?
        <a href="cadastro.html">Criar conta</a>
      </p>
    </div>
  </div>

  <script>
    const API = 'https://piroquinhasbot.onrender.com/api';

    // Já logado → redireciona
    if (localStorage.getItem('jwt')) {
      window.location.replace('perfil.html');
    }

    const form     = document.getElementById('loginForm');
    const btnLogin = document.getElementById('btnLogin');
    const errBox   = document.getElementById('loginError');
    const pwInput  = document.getElementById('password');
    const togglePw = document.querySelector('.toggle-pw');

    togglePw.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      togglePw.textContent = show ? '🙈' : '👁️';
    });

    // Cooldown no cliente após erro — evita spam de requisições
    let cooldownAt = 0;

    function setLoading(on) {
      btnLogin.disabled = on;
      btnLogin.querySelector('.btn-label').classList.toggle('hidden', on);
      btnLogin.querySelector('.btn-spinner').classList.toggle('hidden', !on);
    }

    function showError(msg) {
      errBox.textContent = msg;
      errBox.classList.remove('hidden');
    }

    function clearError() {
      errBox.classList.add('hidden');
    }

    // Mensagens seguras por status — nunca exibe internals do servidor
    function msgPorStatus(status, fallback) {
      if (status === 401) return 'Usuário ou senha incorretos.';
      if (status === 429) return 'Muitas tentativas. Aguarde alguns minutos.';
      if (status >= 500) return 'Servidor indisponível. Tente novamente mais tarde.';
      return fallback || 'Erro ao fazer login.';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      if (Date.now() < cooldownAt) {
        const seg = Math.ceil((cooldownAt - Date.now()) / 1000);
        showError(`Aguarde ${seg}s antes de tentar novamente.`);
        return;
      }

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Preencha usuário e senha.');
        return;
      }

      setLoading(true);
      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          // Cooldown de 3s no cliente após qualquer erro (10s se rate limited)
          cooldownAt = Date.now() + (res.status === 429 ? 10_000 : 3_000);
          showError(msgPorStatus(res.status, data.error));
          return;
        }

        localStorage.setItem('jwt', data.jwt);
        window.location.replace('perfil.html');
      } catch {
        showError('Não foi possível conectar ao servidor.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
